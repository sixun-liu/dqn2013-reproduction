name: verify

on:
  push:
    branches: [main, "release/**"]
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install CPU PyTorch
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install project and Atari tooling
        run: python -m pip install -e ".[atari]"
      - name: Install Atari ROMs
        run: AutoROM --accept-license --quiet
      - name: Unit tests
        env:
          DQN_PYTHON: python
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
        run: scripts/reproduce.sh test
      - name: Verify committed reference result
        env:
          DQN_PYTHON: python
        run: scripts/reproduce.sh verify-reference
      - name: CPU smoke
        env:
          DQN_PYTHON: python
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
        run: scripts/reproduce.sh smoke "${RUNNER_TEMP}/dqn-smoke"

