updated_by: codex
approved_by: user
language: zh-CN
stage: exploration
north_star: 理解DQN从2013到Nature 2015的稳定性演进，并用冻结的Nature 2015基线建立训练阶段、价值估计、内部表征、视觉关注和行为表现之间可复算的局部机制证据。
primary_problem: 在不追加长训练的前提下，构建可追溯离线数据和统计协议，区分网络随训练的价值、表征、视觉敏感性与行为变化，并明确相关性、校准与因果边界。
active_experiment_id: null
active_candidate: DQN2015-OFFLINE-MECHANISM-ATLAS
canonical_baseline:
  id: DQN2015-NATURE-BREAKOUT-INDEPENDENT
  name: Nature 2015 DQN Breakout independent reimplementation, EXP-0004 seed0
  repo_commit: c3af57016e09533316ea8b59b31e7f0b8ab1cdc8
  config: EXP-0004 runtime d1234d94; configs/nature2015_table3_s0_formal_10m.json; 40 checkpoints at 250K intervals; fixed heldout_states.npy
  evaluation_protocol: 每250K training decisions的epsilon=.05完整游戏135K-decision评估用于行为；固定500-state面板用于跨checkpoint配对推理；Q-return校准必须另用与训练一致的clip/life-loss/gamma语义。
parked_lanes:
- 2013实现只作混杂历史上下文，不用于target-network单变量归因。
- Target Network、replay和frame-stack训练消融，等待离线证据门关闭后单独预注册。
- Nature多seed与全Atari复现，当前不扩展。
stage_exit_gates:
- 六篇可解释性来源、Claude综合和本地方法修正进入稳定references并带hash。
- 40个Nature checkpoint在同一500-state面板上的Q、action margin和FC512表征全部提取并通过known-answer/parity门。
- 阶段行为、Q-return校准、表征统计和视觉扰动形成机器表、bootstrap区间和紧凑人工审查图。
- 结案明确哪些只是描述关联，哪些支持局部干预效应，并留下唯一下一因果问题。
