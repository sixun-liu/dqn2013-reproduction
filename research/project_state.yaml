stage_exit_gates:
- 完成100K至250K pilot并确认10M ETA不超过20小时。
- 单seed 10M decisions运行产生40个有效周期评估、held-out Q、checkpoint和同坐标审查图，或形成证据充分的停止说明。
- 观察与解释分离，明确现代ALE、固定学习率和单seed限制，最终裁决不高于promising_unresolved。
